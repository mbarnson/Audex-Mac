name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: PYTHON=python scripts/lint.sh
      - name: Fast tests
        run: python -m pytest -m fast
